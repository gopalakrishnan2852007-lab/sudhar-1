<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>SETU – Sovereign Electronic Terminal for the Underprivileged</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet" />
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0A192F;
            color: #E6F1FF;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .glow-bg {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at 50% 100%, rgba(250, 204, 21, 0.05) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        header {
            width: 100%;
            padding: 24px 24px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: relative;
            z-index: 1;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-text h1 {
            font-size: 26px;
            font-weight: 800;
            color: #FACC15;
            letter-spacing: 2px;
        }

        .logo-text p {
            font-size: 10px;
            color: #8892B0;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .container {
            width: 100%;
            max-width: 480px;
            padding: 16px;
            position: relative;
            z-index: 1;
            flex: 1;
            display: flex;
            flex-direction: column;
            padding-bottom: 120px;
        }

        .section-label {
            font-size: 11px;
            letter-spacing: 2px;
            color: #8892B0;
            text-transform: uppercase;
            margin-bottom: 12px;
            margin-top: 16px;
        }

        .lang-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 24px;
        }

        .lang-btn {
            background: #112240;
            border: 2px solid transparent;
            color: #8892B0;
            padding: 16px 8px;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
            box-shadow: 6px 6px 12px #071222, -6px -6px 12px #0d203c;
        }

        .lang-btn.active {
            border-color: #FACC15;
            color: #FACC15;
            box-shadow: inset 4px 4px 8px #071222, inset -4px -4px 8px #0d203c;
        }

        .lang-btn .native {
            font-size: 16px;
            font-weight: 600;
        }

        .vitals-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 24px;
        }

        .vital-card {
            background: #112240;
            border-radius: 20px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            cursor: pointer;
            box-shadow: 8px 8px 16px #071222, -8px -8px 16px #0d203c;
            transition: all 0.2s;
        }

        .vital-card:active {
            box-shadow: inset 6px 6px 12px #071222, inset -6px -6px 12px #0d203c;
        }

        .vital-icon {
            font-size: 32px;
            background: #0A192F;
            padding: 16px;
            border-radius: 50%;
            box-shadow: inset 4px 4px 8px #071222, inset -4px -4px 8px #0d203c;
        }

        /* Action Cards Output */
        #outputArea {
            display: none;
            flex-direction: column;
            gap: 16px;
            margin-top: 24px;
        }

        .action-card {
            background: #112240;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 8px 8px 16px #071222, -8px -8px 16px #0d203c;
            border: 1px solid #1a365d;
        }

        .action-card h3 {
            color: #FACC15;
            margin-bottom: 8px;
            font-size: 18px;
        }

        .action-card p {
            color: #E6F1FF;
            font-size: 14px;
            line-height: 1.6;
        }

        /* Bottom Controls */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 24px;
            z-index: 100;
            background: linear-gradient(to top, #0A192F 70%, transparent);
        }

        .nav-btn {
            background: #112240;
            border: none;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: #8892B0;
            box-shadow: 6px 6px 12px #071222, -6px -6px 12px #0d203c;
            cursor: pointer;
        }

        .nav-btn:active {
            box-shadow: inset 4px 4px 8px #071222, inset -4px -4px 8px #0d203c;
            color: #FACC15;
        }

        .mic-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .mic-aura {
            position: absolute;
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: rgba(250, 204, 21, 0.2);
            filter: blur(15px);
            animation: pulse 2s infinite ease-in-out;
            display: none;
        }

        .mic-aura.active {
            display: block;
            background: rgba(239, 68, 68, 0.4); /* Red when recording */
        }
        
        .mic-aura.thinking {
            display: block;
            background: rgba(59, 130, 246, 0.4); /* Blue when thinking */
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.2); opacity: 0.8; }
        }

        .setu-orb {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: #FACC15;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            box-shadow: 0 0 20px rgba(250, 204, 21, 0.4);
            position: relative;
            z-index: 2;
            transition: all 0.3s;
        }

        .setu-orb:active {
            transform: scale(0.95);
        }

        .setu-orb.recording {
            background: #EF4444;
            box-shadow: 0 0 20px rgba(239, 68, 68, 0.6);
        }

        .status-text {
            text-align: center;
            color: #8892B0;
            font-size: 14px;
            margin-top: 20px;
            height: 20px;
        }
        
        input[type="file"] {
            display: none;
        }
    </style>
</head>

<body>
    <div class="glow-bg"></div>

    <header>
        <div class="logo">
            <div class="logo-text">
                <h1>SETU</h1>
                <p>Your Voice, Your Rights.</p>
            </div>
        </div>
    </header>

    <div class="container">
        <p class="section-label">Language / மொழி / भाषा</p>
        <div class="lang-grid">
            <button class="lang-btn active" data-lang="ta-IN" data-name="Tamil" onclick="selectLang(this)"><div class="native">தமிழ்</div></button>
            <button class="lang-btn" data-lang="hi-IN" data-name="Hindi" onclick="selectLang(this)"><div class="native">हिंदी</div></button>
            <button class="lang-btn" data-lang="te-IN" data-name="Telugu" onclick="selectLang(this)"><div class="native">తెలుగు</div></button>
            <button class="lang-btn" data-lang="ml-IN" data-name="Malayalam" onclick="selectLang(this)"><div class="native">മലയാളം</div></button>
            <button class="lang-btn" data-lang="mr-IN" data-name="Marathi" onclick="selectLang(this)"><div class="native">मराठी</div></button>
            <button class="lang-btn" data-lang="bn-IN" data-name="Bengali" onclick="selectLang(this)"><div class="native">বাংলা</div></button>
            <button class="lang-btn" data-lang="gu-IN" data-name="Gujarati" onclick="selectLang(this)"><div class="native">ગુજરાતી</div></button>
            <button class="lang-btn" data-lang="kn-IN" data-name="Kannada" onclick="selectLang(this)"><div class="native">ಕನ್ನಡ</div></button>
        </div>

        <div id="vitalsArea">
            <p class="section-label">Vitals Dashboard</p>
            <div class="vitals-grid">
                <div class="vital-card" onclick="askAI('Tell me about government health schemes')">
                    <div class="vital-icon">🏥</div>
                    <span style="font-weight: 600;">Health</span>
                </div>
                <div class="vital-card" onclick="askAI('Tell me about PM Kisan and farming help')">
                    <div class="vital-icon">🚜</div>
                    <span style="font-weight: 600;">Farming</span>
                </div>
                <div class="vital-card" onclick="askAI('How to apply for old age pension')">
                    <div class="vital-icon">💰</div>
                    <span style="font-weight: 600;">Pension</span>
                </div>
                <div class="vital-card" onclick="askAI('Education scholarships available')">
                    <div class="vital-icon">🎓</div>
                    <span style="font-weight: 600;">Education</span>
                </div>
            </div>
            <div class="status-text" id="statusText">Tap the golden orb to speak...</div>
        </div>

        <div id="outputArea">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h2 style="color: #FACC15;">Action Steps</h2>
                <button onclick="resetUI()" style="background:none; border:none; color:#8892B0; font-size: 24px; cursor: pointer;">✕</button>
            </div>
            <div id="cardsContainer"></div>
        </div>
    </div>

    <!-- Bottom Navigation -->
    <div class="bottom-nav">
        <!-- Document Vault (Placeholder) -->
        <button class="nav-btn">📁</button>

        <!-- Mic Orb -->
        <div class="mic-wrapper">
            <div class="mic-aura" id="micAura"></div>
            <button class="setu-orb" id="micBtn" onclick="toggleMic()">🎙️</button>
        </div>

        <!-- Vision Camera -->
        <button class="nav-btn" onclick="document.getElementById('cameraInput').click()">📷</button>
        <input type="file" id="cameraInput" accept="image/*" capture="environment" onchange="handleImageUpload(event)">
    </div>

    <script>
        let selectedLang = 'ta-IN';
        let selectedLangName = 'Tamil';
        let recognition = null;
        let isRecording = false;

        function selectLang(btn) {
            document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            selectedLang = btn.dataset.lang;
            selectedLangName = btn.dataset.name;
        }

        function toggleMic() {
            if (isRecording) stopRecording();
            else startRecording();
        }

        function startRecording() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) { alert('Speech Recognition not supported in this browser.'); return; }
            recognition = new SpeechRecognition();
            recognition.lang = selectedLang;
            recognition.interimResults = false;

            recognition.onstart = () => {
                isRecording = true;
                document.getElementById('micBtn').classList.add('recording');
                document.getElementById('micAura').className = 'mic-aura active';
                document.getElementById('statusText').textContent = 'Listening... Speak now.';
                document.getElementById('vitalsArea').style.display = 'block';
                document.getElementById('outputArea').style.display = 'none';
            };

            recognition.onresult = (e) => {
                const text = e.results[0][0].transcript;
                askAI(text);
            };

            recognition.onend = () => {
                isRecording = false;
                document.getElementById('micBtn').classList.remove('recording');
                if(document.getElementById('micAura').classList.contains('active')) {
                   document.getElementById('micAura').className = 'mic-aura';
                   document.getElementById('statusText').textContent = 'Tap the golden orb to speak...';
                }
            };

            recognition.start();
        }

        function stopRecording() {
            if (recognition) recognition.stop();
        }

        async function askAI(text) {
            document.getElementById('micAura').className = 'mic-aura thinking';
            document.getElementById('statusText').textContent = 'SETU is thinking...';
            
            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text, language: selectedLangName })
                });
                
                const data = await res.json();
                if(data.error) throw new Error(data.error);
                
                renderCards(data.steps, data.audioBase64);
            } catch (err) {
                alert("Error connecting to SETU AI: " + err.message);
                resetUI();
            }
        }

        async function handleImageUpload(e) {
            const file = e.target.files[0];
            if (!file) return;

            document.getElementById('micAura').className = 'mic-aura thinking';
            document.getElementById('statusText').textContent = 'Analyzing Document...';

            const reader = new FileReader();
            reader.onloadend = async () => {
                const base64 = reader.result.split(',')[1];
                try {
                    const res = await fetch('/api/vision', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ imageBase64: base64, mimeType: file.type, language: selectedLangName })
                    });
                    const data = await res.json();
                    if(data.error) throw new Error(data.error);
                    renderCards(data.steps, data.audioBase64);
                } catch(err) {
                    alert("Error analyzing image: " + err.message);
                    resetUI();
                }
            };
            reader.readAsDataURL(file);
        }

        function renderCards(steps, audioBase64) {
            document.getElementById('micAura').className = 'mic-aura';
            document.getElementById('vitalsArea').style.display = 'none';
            
            const container = document.getElementById('cardsContainer');
            container.innerHTML = '';

            if (steps && Array.isArray(steps)) {
                steps.forEach((step, idx) => {
                    const card = document.createElement('div');
                    card.className = 'action-card';
                    card.innerHTML = `
                        <h3>Step ${idx + 1}: ${step.title || 'Action'}</h3>
                        <p>${step.description}</p>
                    `;
                    container.appendChild(card);
                });
            } else {
                container.innerHTML = `<div class="action-card"><p>Could not generate steps.</p></div>`;
            }

            document.getElementById('outputArea').style.display = 'flex';

            if(audioBase64) {
                // Play audio if generated
                const audio = new Audio("data:audio/mp3;base64," + audioBase64);
                audio.play();
            } else if (window.speechSynthesis) {
                // Fallback local TTS
                const fullText = steps.map(s => s.description).join(". ");
                const utter = new SpeechSynthesisUtterance(fullText);
                utter.lang = selectedLang;
                window.speechSynthesis.speak(utter);
            }
        }

        function resetUI() {
            document.getElementById('micAura').className = 'mic-aura';
            document.getElementById('outputArea').style.display = 'none';
            document.getElementById('vitalsArea').style.display = 'block';
            document.getElementById('statusText').textContent = 'Tap the golden orb to speak...';
            window.speechSynthesis.cancel();
        }
    </script>
</body>

</html>
